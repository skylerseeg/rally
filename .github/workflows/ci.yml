# .github/workflows/ci.yml
#
# Runs `pnpm typecheck` + `pnpm test` on every pull request and on push
# to main. This is the structural fix for the failure mode that bit P12:
# bugs landing on main with no automated gate.
#
# Intentionally NOT included yet:
#   - `pnpm lint`  — `next lint` was removed in Next 16 and our `lint`
#                    script errors out. Restore (or replace with a flat-
#                    config eslint script) in a follow-up.
#   - `pnpm build` — needs real-shaped env vars; current pipeline runs on
#                    placeholder values which would either fail (if a
#                    code path validates at build time) or pass-falsely
#                    (if it doesn't). Add separately if/when we want to
#                    catch SSR/import-time breakage in CI.
#   - Supabase migration dry-run — partially closed by the `db-tests` job
#                                   below, which boots a local Postgres and
#                                   runs `supabase db start` (applies every
#                                   migration) before executing pgTAP. A
#                                   migration that fails to apply will turn
#                                   the job red. Production `supabase db
#                                   push` is still the manual gate for
#                                   pushing to hosted.
#
# Mark both `typecheck + test` and `db-tests` as required status checks on
# the `main` branch in GitHub Settings → Branches → Branch protection.
# Without that, the workflow runs but doesn't block merges on failure.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel an in-progress run when a PR is updated; let push-to-main runs
  # finish (they don't pile up the same way).
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        # No `version` here — pnpm/action-setup@v4 errors out if it sees
        # one specified both here and in package.json#packageManager.
        # `packageManager: pnpm@10.33.0` is the source of truth.
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Tests
        # withUsage and the agent tests set RALLY_USAGE_HASH_SALT /
        # ANTHROPIC_API_KEY per-test, so we don't need real values here.
        # If a future test needs them at the suite level, set them under
        # `env:` rather than reaching for repository secrets — CI must
        # never carry production keys.
        run: pnpm test

  db-tests:
    name: db-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Postgres
        # `supabase db start` boots only the database container (no Auth,
        # Storage, Studio). All migrations under supabase/migrations are
        # applied here; a broken migration fails the job at this step.
        run: supabase db start

      - name: Run pgTAP tests
        # Discovers .sql files under supabase/tests/ recursively. Add new
        # policy or schema tests there to extend this gate.
        run: supabase test db
